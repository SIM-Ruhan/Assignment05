<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue</title>
   <!-- Font link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- Tailwind & Daisy UI -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <section  class="max-w-md mx-auto p-8 my-15 shadow-2xl">
<div class="text-center">
    <img class="mx-auto" src="./assets/github-logo.png" alt="">
    <h3 class="mt-6 font-semibold text-2xl">GitHub Issues Tracker</h3>
    <p class="text-[#64748B]">Sign in to manage your issues</p>
</div>

<div class="form pt-8 flex flex-col items-center">
    <div class="card bg-base-100 w-full max-w-sm shrink-0">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-[#080808] font-medium mb-1">Username</label>
          <input id="input-username" type="text" class="input p-5 rounded-lg" placeholder="Enter Username" />
          <p class="text-[#4A00FF] mb-2">Default: admin</p>
          <label class="label text-[#080808] font-medium mb-1">Password</label>
          <input id="input-password" type="text" class="input p-5 rounded-lg" placeholder="Enter Password" />
         <p class="text-[#4A00FF] mb-2">Default: admin123</p>
          <button id="login-btn" class="btn bg-[#4A00FF] mt-4 text-white rounded-lg font-semibold py-6">Sign In</button>
        </fieldset>
      </div>
    </div>
</div>

<div class="flex items-center mb-6">
  <hr class="grow border-t border-[#E4E4E7]">
  <span class="mx-4 text-[#1F2937]">OR</span>
  <hr class="grow border-t border-[#E4E4E7]">
</div>

<div class="">
    <p class="text-center text-[#64748B] text-sm">Demo Credentials:</p>
    <div class="text-center py-6 bg-[#F8FAFC] mt-2">
        <p class=""><span class="font-semibold">Username:</span> admin</p>
        <p><span class="font-semibold">Password:</span> admin123</p>
    </div>
</div>
</section>

<script src="./script/login.js"></script>

</body>
</html>
