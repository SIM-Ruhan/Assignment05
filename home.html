<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Home-Page</title>
</head>
<body class="bg-[#F8FAFC]">
    <!-- Nav Bar -->
<nav class="sm:px-20 px-5 py-4 md:flex justify-between items-center shadow bg-white">
    <div class="flex items-center gap-1">
        <img class="w-9" src="./assets/github-logo.png" alt="github logo">
        <p class="font-semibold sm:text-2xl">GitHub Issues Tracker</p>
    </div>
    <div class="flex items-center justify-center mt-4 gap-2">
        <input id="input" type="text" placeholder="Search issues..." class="p-1 border-[#E4E4E7] rounded-sm">
        <button id="search" class="bg-[#4A00FF] text-white px-3 py-1.5 rounded-sm font-semibold">+ New Issue</button>
    </div>
</nav>
<!-- All Open Close -->
<header>
<div class="w-[85%] mx-auto mt-15 p-4 bg-white shadow space-x-2">
    <button onclick="toggleStyle('all-filter-btn')" class="bg-[#4A00FF] text-white px-5 py-2 rounded-sm" id="all-filter-btn">All</button>
    <button onclick="toggleStyle('open-filter-btn')" class="bg-white text-[#64748B] border border-[#E4E4E7] px-5 py-2 rounded-sm" id="open-filter-btn">Open</button>
    <button onclick="toggleStyle('closed-filter-btn')" class="bg-white text-[#64748B] border border-[#E4E4E7] px-5 py-2 rounded-sm" id="closed-filter-btn">Closed</button>
</div>
</header>

<!-- Issue Tracker -->
 <section>
    <div class="w-[85%] mx-auto sm:flex justify-between items-center p-6 shadow bg-white my-4">
        <div class="flex items-center gap-2">
        <div class="bg-[#ECE4FF] p-2 rounded-full"><img src="./assets/Aperture.png" alt="Aperture"></div>
        <div>
            <h2 class="text-xl font-semibold"><span id="issues">50</span> Issues</h2>
            <p class="text-[#64748B]">Track and manage your project issues</p>
        </div>
    </div>
  
    <div class="flex justify-center gap-5">
<div class="flex items-center gap-1">
   <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div><p class="font-medium">open</p>
</div>
<div class="flex items-center gap-1">
   <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div><p class="font-medium">closed</p> 
</div>
  
    </div>  </div>
 </section>

 <!-- Loading Spinner -->
<div id="spinner" class="hidden flex justify-center my-10">
  <span class="loading loading-ring loading-xl"></span>
</div>

<!-- Card Section -->
 <section id="cardContainer" class="bg-[#FBFBFB] w-[85%] mx-auto p-6 grid grid-cols-1 md:grid-cols-4 gap-3 shadow">
 </section>
<!-- Modal section -->
<dialog id="modal" class="modal modal-middle">
  <div class="modal-box max-w-2xl">

    <h3 id="modal-title" class="text-2xl font-bold mb-2"></h3>

    <div class="flex items-center gap-3 text-sm text-gray-500 mb-3">
        <span id="modal-status" class="px-3 py-1 rounded-full text-xs font-semibold"></span>
        <span>•</span>
        <span>Opened by <span id="modal-author" class="font-medium"></span></span>
        <span>•</span>
        <span id="modal-update"></span>
    </div>

    <div id="modal-labels" class="flex gap-2 mb-4"></div>

    <p id="modal-description" class="text-gray-600 mb-6"></p>

    <div class="bg-gray-100 rounded-lg p-4 flex justify-between">

        <div>
            <p class="text-sm text-gray-500">Assignee:</p>
            <p id="modal-assignee" class="font-semibold"></p>
        </div>

        <div>
            <p class="text-sm text-gray-500">Priority:</p>
            <span id="modal-priority" class="px-3 py-1 rounded-full text-xs font-semibold"></span>
        </div>

    </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="bg-[#4A00FF] text-white px-5 py-2 rounded-md border-none">Close</button>
      </form>
    </div>

  </div>
</dialog>


<script src="./script/home.js"></script>
</body>
</html>
