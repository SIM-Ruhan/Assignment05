<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Home-Page</title>
</head>
<body class="bg-[#F8FAFC]">
    <!-- Nav Bar -->
<nav class="sm:px-20 px-5 py-4 md:flex justify-between items-center shadow bg-white">
    <div class="flex items-center gap-1">
        <img class="w-9" src="./assets/github-logo.png" alt="github logo">
        <p class="font-semibold sm:text-2xl">GitHub Issues Tracker</p>
    </div>
    <div class="flex items-center justify-center mt-4 gap-2">
        <input type="text" placeholder="Search issues..." class="p-1 border-[#E4E4E7] rounded-sm">
        <button class="bg-[#4A00FF] text-white px-3 py-1.5 rounded-sm font-semibold">+New Issue</button>
    </div>
</nav>
<!-- All Open Close -->
<header>
<div class="w-[85%] mx-auto mt-15 p-4 bg-white shadow space-x-2">
    <button onclick="toggleStyle('all-filter-btn')" class="bg-[#4A00FF] text-white px-5 py-2 rounded-sm" id="all-filter-btn">All</button>
    <button onclick="toggleStyle('open-filter-btn')" class="bg-white text-[#64748B] border border-[#E4E4E7] px-5 py-2 rounded-sm" id="open-filter-btn">Open</button>
    <button onclick="toggleStyle('closed-filter-btn')" class="bg-white text-[#64748B] border border-[#E4E4E7] px-5 py-2 rounded-sm" id="closed-filter-btn">Closed</button>
</div>
</header>

<!-- Issue Tracker -->
 <section>
    <div class="w-[85%] mx-auto sm:flex justify-between items-center p-6 shadow bg-white my-4">
        <div class="flex items-center gap-2">
        <div class="bg-[#ECE4FF] p-2 rounded-full"><img src="./assets/Aperture.png" alt="Aperture"></div>
        <div>
            <h2 class="text-xl font-semibold"><span id="issues">50</span> Issues</h2>
            <p class="text-[#64748B]">Track and manage your project issues</p>
        </div>
    </div>
  
    <div class="flex justify-center gap-5">
<div class="flex items-center gap-1">
   <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div><p class="font-medium">open</p>
</div>
<div class="flex items-center gap-1">
   <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div><p class="font-medium">closed</p> 
</div>
  
    </div>  </div>
 </section>

<!-- Card Section -->
 <section id="cardContainer" class="bg-[#FBFBFB] w-[85%] mx-auto p-6 grid grid-cols-1 md:grid-cols-4 gap-3 shadow">
    <div class="p-4 border border-gray-200 border-t-4 border-t-green-500 rounded-lg">
<div class="flex justify-between">
    <div class=""><img src="./assets/Open-Status.png" alt="Open-Status"></div>
<div class="py-1 px-4 rounded-[100px] bg-red-200 text-red-500 text-[14px]">HIGH</div>
</div>
<div class="">
    <h4 class="text-[14px] font-semibold my-3">Fix navigation menu on mobile devices</h4>
    <p class="text-[12px] text-[#64748B]">The navigation menu doesn't collapse properly on mobile devices...</p>
    
    <div class="flex items-center gap-1 my-3">
        <div><p class="bg-[#FECACA] text-[#EF4444] p-1 rounded-[100px] text-[12px] font-medium"><i class="fa-solid fa-bug"></i>BUG</p></div>
        <div><p class="bg-[#FDE68A] text-[#D97706] p-1 rounded-[100px] text-[12px] font-medium"><i class="fa-solid fa-life-ring"></i>HELP WANTED</p></div>
    </div>
    <hr class="text-[#E4E4E7]">
    <p class="text-[12px] text-[#64748B] mt-4">#1 by john_doe</p>
    <p class="text-[12px] text-[#64748B]">1/15/2024</p>
</div>

</div>
 </section>

<script src="./script/home.js"></script>
</body>
</html>
